<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        /* Coffee Timeline Styles */
        .journey-section {
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-lg);
            border-bottom: 1px solid var(--gray-800);
        }

        .journey-header {
            display: flex;
            align-items: flex-end;
            gap: 24px;
            margin-bottom: 8px;
        }

        .year-display h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--yellow);
            letter-spacing: -0.02em;
            line-height: 1;
            min-width: 80px;
        }

        .roaster-bars {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 50px;
        }

        .roaster-bar {
            flex: 1;
            background: var(--pink);
            opacity: 0.3;
            border-radius: 2px 2px 0 0;
            transition: all 0.2s;
            min-height: 4px;
            cursor: pointer;
        }

        .roaster-bar.active {
            opacity: 1;
            background: var(--yellow);
        }

        .roaster-bar:hover {
            opacity: 0.7;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 20px;
        }

        .slider-spacer {
            min-width: 80px;
        }

        .slider-wrapper {
            flex: 1;
        }

        .year-slider {
            width: 100%;
            -webkit-appearance: none;
            height: 3px;
            background: var(--gray-800);
            outline: none;
            border-radius: 2px;
        }

        .year-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--yellow);
            cursor: pointer;
            border-radius: 2px;
        }

        .year-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--yellow);
            cursor: pointer;
            border: none;
            border-radius: 2px;
        }

        .timeline-markers {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
        }

        .timeline-markers span {
            font-size: 0.7rem;
            color: var(--gray-600);
        }

        /* Decade nav */
        .decade-nav {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .decade-btn {
            background: transparent;
            color: var(--gray-600);
            border: 1px solid var(--gray-800);
            border-radius: 4px;
            padding: 6px 12px;
            font-family: var(--font-main);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .decade-btn:hover {
            color: var(--yellow);
            border-color: var(--yellow);
        }

        .decade-btn.active {
            background: var(--yellow);
            color: var(--black);
            border-color: var(--yellow);
        }

        /* Compact Roaster Cards */
        .roasters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 8px;
        }

        .roaster-card {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-radius: 4px;
            padding: 8px 10px;
            transition: all 0.2s;
        }

        .roaster-card:hover {
            border-color: var(--pink);
        }

        .roaster-card.founded-this-year {
            border-color: var(--yellow);
            background: rgba(240, 192, 20, 0.05);
        }

        .roaster-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        .roaster-info {
            flex: 1;
            min-width: 0;
        }

        .roaster-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--white);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .roaster-meta {
            font-size: 0.6rem;
            color: var(--gray-500);
        }

        .roaster-year {
            font-size: 0.65rem;
            color: var(--yellow);
            font-weight: 600;
            flex-shrink: 0;
        }

        /* Region groups */
        .region-section {
            margin-bottom: 20px;
        }

        .region-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .region-header .icon {
            font-size: 1rem;
        }

        .region-header h3 {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--pink);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .region-header .count {
            font-size: 0.65rem;
            color: var(--gray-600);
        }

        /* Active region in sidebar */
        .genre-link.filter-active {
            color: var(--yellow) !important;
            background: rgba(240, 192, 20, 0.1);
        }

        .genre-link.filter-active::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--yellow);
            border-radius: 50%;
            margin-right: var(--space-xs);
            vertical-align: middle;
        }

        .no-roasters {
            color: var(--gray-600);
            font-size: 0.85rem;
            padding: 20px;
            text-align: center;
        }

        /* Search */
        .search-container {
            position: relative;
            width: 240px;
            flex-shrink: 0;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-radius: var(--radius-sm);
            color: var(--white);
            font-family: var(--font-main);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input::placeholder { color: var(--gray-600); }
        .search-input:focus { border-color: var(--yellow); }

        .search-results {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-top: none;
            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
            max-height: 260px;
            overflow-y: auto;
            z-index: 100;
        }

        .search-results.open { display: block; }

        .search-result-item {
            padding: 8px 12px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--gray-800);
        }

        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: var(--gray-800); }

        .search-result-item .result-icon { font-size: 1rem; }
        .search-result-item .result-name { font-size: 0.8rem; color: var(--white); font-weight: 500; }
        .search-result-item .result-meta { font-size: 0.65rem; color: var(--gray-600); margin-left: auto; white-space: nowrap; }

        @media (max-width: 768px) {
            .search-container { width: 100%; }
        }
    </style>
</head>
<body>

    <main class="music-page">
        <!-- Page Header - Title and subtitle side by side -->
        <header class="music-header">

                <p>Origins, producers, and roasts from around the world</p>

            <div class="search-container">

        <!-- Main Layout -->

                        <li><a href="#" class="genre-link filter-active" data-filter="all">All</a></li>

                        <li><a href="#" class="genre-link" data-filter="europe">Europe</a></li>

            <!-- Main Content -->

                <!-- Coffee Timeline Section -->

                        <button class="decade-btn" data-year="1966">60s</button>
                        <button class="decade-btn" data-year="1970">70s</button>
                        <button class="decade-btn" data-year="1980">80s</button>
                        <button class="decade-btn" data-year="1990">90s</button>
                        <button class="decade-btn" data-year="2000">00s</button>
                        <button class="decade-btn" data-year="2010">10s</button>
                        <button class="decade-btn" data-year="2020">20s</button>
                    </nav>

                    <div class="journey-header">
                        <div class="year-display">
                            <h2 id="currentYear">1995</h2>
                        </div>

                    </div>

                    <div class="slider-row">
                        <div class="slider-spacer"></div>

                            <input type="range" class="year-slider" id="yearSlider" min="1966" max="2025" value="1995">

    <!-- Footer -->
    <footer class="footer">

                <div class="footer-brand">

                <p>© 2025 Guapa Collective</p>

    <script>
        // Roasters data with founding years
        const roasters = [
            // 1960s
            { name: "Peet's Coffee", year: 1966, region: "usa", location: "Berkeley, CA", icon: "☕" },
            
            // 1970s
            { name: "Starbucks", year: 1971, region: "usa", location: "Seattle, WA", icon: "⭐" },
            { name: "Coffee Connection", year: 1975, region: "usa", location: "Boston, MA", icon: "🔗" },
            { name: "Allegro Coffee", year: 1977, region: "usa", location: "Boulder, CO", icon: "🏔️" },
            { name: "Monmouth Coffee", year: 1978, region: "europe", location: "London, UK", icon: "🇬🇧" },
            
            // 1980s
            { name: "Peerless Coffee", year: 1924, region: "usa", location: "Oakland, CA", icon: "🏆" },
            { name: "Equator Coffees", year: 1995, region: "usa", location: "San Rafael, CA", icon: "🌍" },
            
            // 1990s
            { name: "Counter Culture", year: 1995, region: "usa", location: "Durham, NC", icon: "🔄" },
            { name: "Intelligentsia", year: 1995, region: "usa", location: "Chicago, IL", icon: "💡" },
            { name: "Stumptown", year: 1999, region: "usa", location: "Portland, OR", icon: "🌲" },
            { name: "Square Mile", year: 1999, region: "europe", location: "London, UK", icon: "📐" },
            { name: "Tim Wendelboe", year: 1999, region: "nordic", location: "Oslo, Norway", icon: "🇳🇴" },
            { name: "Café Imports", year: 1997, region: "usa", location: "Minneapolis, MN", icon: "📦" },
            
            // 2000s
            { name: "Blue Bottle", year: 2002, region: "usa", location: "Oakland, CA", icon: "🫐" },
            { name: "Single O", year: 2003, region: "asia", location: "Sydney, AU", icon: "🇦🇺" },
            { name: "Ritual Coffee", year: 2005, region: "usa", location: "San Francisco, CA", icon: "✨" },
            { name: "Koppi", year: 2007, region: "nordic", location: "Helsingborg, SE", icon: "🇸🇪" },
            { name: "Verve Coffee", year: 2007, region: "usa", location: "Santa Cruz, CA", icon: "🌊" },
            { name: "Heart Coffee", year: 2009, region: "usa", location: "Portland, OR", icon: "❤️" },
            { name: "Drop Coffee", year: 2009, region: "nordic", location: "Stockholm, SE", icon: "💧" },
            { name: "Proud Mary", year: 2009, region: "asia", location: "Melbourne, AU", icon: "🦘" },
            { name: "Market Lane", year: 2009, region: "asia", location: "Melbourne, AU", icon: "🛒" },
            
            // 2010s
            { name: "The Barn", year: 2010, region: "europe", location: "Berlin, DE", icon: "🏠" },
            { name: "Five Elephant", year: 2010, region: "europe", location: "Berlin, DE", icon: "🐘" },
            { name: "Workshop Coffee", year: 2011, region: "europe", location: "London, UK", icon: "🔧" },
            { name: "La Cabra", year: 2012, region: "nordic", location: "Aarhus, DK", icon: "🐐" },
            { name: "Fuglen", year: 2012, region: "nordic", location: "Oslo/Tokyo", icon: "🦅" },
            { name: "Onyx Coffee Lab", year: 2012, region: "usa", location: "Rogers, AR", icon: "⬛" },
            { name: "% Arabica", year: 2014, region: "asia", location: "Kyoto, JP", icon: "🇯🇵" },
            { name: "Nomad Coffee", year: 2014, region: "europe", location: "Barcelona, ES", icon: "🏜️" },
            { name: "Passenger Coffee", year: 2014, region: "usa", location: "Lancaster, PA", icon: "🚂" },
            { name: "Brandywine Coffee", year: 2015, region: "usa", location: "Wilmington, DE", icon: "🌿" },
            { name: "April Coffee", year: 2016, region: "nordic", location: "Copenhagen, DK", icon: "🌸" },
            { name: "Gardelli", year: 2016, region: "europe", location: "Forlì, IT", icon: "🏆" },
            { name: "Little Wolf", year: 2016, region: "usa", location: "Ipswich, MA", icon: "🐺" },
            { name: "Sey Coffee", year: 2017, region: "usa", location: "Brooklyn, NY", icon: "🗽" },
            { name: "Mañana", year: 2018, region: "usa", location: "Brooklyn, NY", icon: "🌅" },
            { name: "Manhattan Coffee", year: 2018, region: "europe", location: "Rotterdam, NL", icon: "🏙️" },
            { name: "Commonplace Coffee", year: 2018, region: "usa", location: "Pittsburgh, PA", icon: "🏭" },
            
            // 2020s
            { name: "Dak Coffee", year: 2020, region: "europe", location: "Amsterdam, NL", icon: "🦆" },
            { name: "Detour Coffee", year: 2009, region: "usa", location: "Burlington, ON", icon: "🔀" },
            { name: "Coffee Bros", year: 2019, region: "usa", location: "Queens, NY", icon: "👬" },
            { name: "Black & White", year: 2015, region: "usa", location: "Wake Forest, NC", icon: "◐" },
            { name: "Methodical Coffee", year: 2015, region: "usa", location: "Greenville, SC", icon: "📊" },
        ];

        const MIN_YEAR = 1966;
        const MAX_YEAR = 2025;

        let currentYear = 1995;
        let activeFilter = 'all';

        const yearSlider = document.getElementById('yearSlider');
        const currentYearDisplay = document.getElementById('currentYear');
        const roasterBars = document.getElementById('roasterBars');
        const roastersDisplay = document.getElementById('roastersDisplay');

        // Filter sidebar clicks
        document.querySelectorAll('.genre-link[data-filter]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.genre-link[data-filter]').forEach(l => l.classList.remove('filter-active'));
                link.classList.add('filter-active');
                activeFilter = link.dataset.filter;
                updateDisplay();
            });
        });

        // Decade button clicks - jump to that decade
        document.querySelectorAll('.decade-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const year = parseInt(btn.dataset.year);
                yearSlider.value = year;
                updateYear(year);
            });
        });

        function updateDecadeButtons() {
            const decadeStart = Math.floor(currentYear / 10) * 10;
            document.querySelectorAll('.decade-btn').forEach(btn => {
                const btnYear = parseInt(btn.dataset.year);
                const btnDecade = Math.floor(btnYear / 10) * 10;
                btn.classList.toggle('active', btnDecade === decadeStart);
            });
        }

        function updateTimelineMarkers() {
            const markers = document.getElementById('timelineMarkers');
            markers.innerHTML = `
                <span>${MIN_YEAR}</span>
                <span>1980</span>
                <span>1990</span>
                <span>2000</span>
                <span>2010</span>
                <span>${MAX_YEAR}</span>
            `;
        }

        function getRoasterCounts() {
            const counts = {};
            for (let y = MIN_YEAR; y <= MAX_YEAR; y++) counts[y] = 0;
            
            roasters.forEach(r => {
                if (r.year >= MIN_YEAR && r.year <= MAX_YEAR) {
                    if (activeFilter === 'all' || r.region === activeFilter) {
                        counts[r.year]++;
                    }
                }
            });
            return counts;
        }

        function renderRoasterBars() {
            const counts = getRoasterCounts();
            const maxCount = Math.max(...Object.values(counts), 1);
            roasterBars.innerHTML = '';
            
            for (let y = MIN_YEAR; y <= MAX_YEAR; y++) {
                const bar = document.createElement('div');
                bar.className = `roaster-bar${y === currentYear ? ' active' : ''}`;
                const height = (counts[y] / maxCount) * 100;
                bar.style.height = `${Math.max(height, 4)}%`;
                bar.title = `${y}: ${counts[y]} roasters founded`;
                bar.onclick = () => { yearSlider.value = y; updateYear(y); };
                roasterBars.appendChild(bar);
            }
        }

        function getFilteredRoasters() {
            return roasters.filter(r => {
                if (activeFilter !== 'all' && r.region !== activeFilter) return false;
                return r.year <= currentYear;
            });
        }

        function renderRoasters() {
            const filtered = getFilteredRoasters();
            
            if (filtered.length === 0) {
                roastersDisplay.innerHTML = '<div class="no-roasters">No roasters found for this period.</div>';
                return;
            }

            // Group by region
            const byRegion = {};
            filtered.forEach(r => {
                if (!byRegion[r.region]) byRegion[r.region] = [];
                byRegion[r.region].push(r);
            });

            const regionNames = {
                usa: { name: 'USA', icon: '🇺🇸' },
                europe: { name: 'Europe', icon: '🇪🇺' },
                nordic: { name: 'Nordic', icon: '❄️' },
                asia: { name: 'Asia Pacific', icon: '🌏' }
            };

            let html = '';
            Object.entries(byRegion).forEach(([regionId, regionRoasters]) => {
                const region = regionNames[regionId] || { name: regionId, icon: '☕' };
                regionRoasters.sort((a, b) => b.year - a.year || a.name.localeCompare(b.name));
                
                html += `
                    <div class="region-section">
                        <div class="region-header">
                            <span class="icon">${region.icon}</span>
                            <h3>${region.name}</h3>
                            <span class="count">(${regionRoasters.length})</span>
                        </div>
                        <div class="roasters-grid">
                            ${regionRoasters.map(r => `
                                <div class="roaster-card${r.year === currentYear ? ' founded-this-year' : ''}">
                                    <span class="roaster-icon">${r.icon}</span>
                                    <div class="roaster-info">
                                        <div class="roaster-name">${r.name}</div>
                                        <div class="roaster-meta">${r.location}</div>
                                    </div>
                                    <span class="roaster-year">${r.year}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            roastersDisplay.innerHTML = html;
        }

        function updateYear(year) {
            currentYear = parseInt(year);
            currentYearDisplay.textContent = currentYear;
            updateDecadeButtons();
            renderRoasterBars();
            renderRoasters();
        }

        function updateDisplay() {
            currentYearDisplay.textContent = currentYear;
            updateTimelineMarkers();
            updateDecadeButtons();
            renderRoasterBars();
            renderRoasters();
        }

        yearSlider.addEventListener('input', (e) => updateYear(e.target.value));

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentYear > MIN_YEAR) {
                yearSlider.value = currentYear - 1;
                updateYear(currentYear - 1);
            }
            if (e.key === 'ArrowRight' && currentYear < MAX_YEAR) {
                yearSlider.value = currentYear + 1;
                updateYear(currentYear + 1);
            }
        });

        // Mobile nav toggle
        const navToggle = document.querySelector('.nav-toggle');
        const navLinks = document.querySelector('.nav-links');
        navToggle.addEventListener('click', () => {
            navLinks.classList.toggle('nav-links--open');
            navToggle.classList.toggle('nav-toggle--open');
        });

        // Search functionality
        const searchInput = document.getElementById('searchInput');
        const searchResultsEl = document.getElementById('searchResults');

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim().toLowerCase();
            if (q.length < 2) { searchResultsEl.classList.remove('open'); return; }
            const matches = roasters.filter(r => r.name.toLowerCase().includes(q)).slice(0, 8);
            if (matches.length === 0) { searchResultsEl.classList.remove('open'); return; }
            searchResultsEl.innerHTML = matches.map((m, i) => `
                <div class="search-result-item" data-index="${i}">
                    <span class="result-icon">${m.icon}</span>
                    <span class="result-name">${m.name}</span>
                    <span class="result-meta">${m.location} · ${m.year}</span>
                </div>
            `).join('');
            searchResultsEl.classList.add('open');
            searchResultsEl.querySelectorAll('.search-result-item').forEach((el, i) => {
                el.addEventListener('click', () => {
                    const match = matches[i];
                    if (match.year >= MIN_YEAR && match.year <= MAX_YEAR) {
                        yearSlider.value = match.year;
                        updateYear(match.year);
                    }
                    searchInput.value = '';
                    searchResultsEl.classList.remove('open');
                });
            });
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) searchResultsEl.classList.remove('open');
        });

        // Initialize
        updateTimelineMarkers();
        updateDisplay();
    </script>
</body>
</html>
