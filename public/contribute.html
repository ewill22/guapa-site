<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Descriptions — Guapa</title>
  <link rel="stylesheet" href="./guapa-base.css">
  <link rel="stylesheet" href="./styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Instrument Sans', sans-serif;
      min-height: 100vh;
      margin: 0;
    }

    /* ── Header ──────────────────────────────────────── */
    .page-header {
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 1px solid var(--gray-800);
      max-width: 900px;
      margin: 0 auto;
    }
    .page-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0 0 0.4rem;
    }
    .page-header p {
      color: var(--gray-400);
      font-size: 0.85rem;
      margin: 0;
    }

    /* ── Search ──────────────────────────────────────── */
    .search-bar {
      position: sticky;
      top: 56px;
      background: var(--black);
      z-index: 90;
      padding: 1rem 1.5rem;
      max-width: 900px;
      margin: 0 auto;
      border-bottom: 1px solid var(--gray-800);
    }
    .search-bar input {
      width: 100%;
      background: var(--gray-900);
      border: 1px solid var(--gray-800);
      border-radius: 6px;
      padding: 0.6rem 1rem;
      color: var(--white);
      font-family: inherit;
      font-size: 0.9rem;
      box-sizing: border-box;
      outline: none;
    }
    .search-bar input:focus { border-color: var(--gray-600); }
    .search-bar input::placeholder { color: var(--gray-600); }

    /* ── Filter tabs ─────────────────────────────────── */
    .filter-bar {
      max-width: 900px;
      margin: 0 auto;
      padding: 0.75rem 1.5rem 0;
      display: flex;
      gap: 0.5rem;
    }
    .filter-btn {
      font-size: 0.78rem;
      font-weight: 600;
      background: none;
      border: 1px solid var(--gray-800);
      border-radius: 20px;
      padding: 0.3rem 0.9rem;
      color: var(--gray-400);
      cursor: pointer;
      font-family: inherit;
    }
    .filter-btn.active {
      border-color: var(--yellow);
      color: var(--yellow);
    }
    .filter-count {
      font-weight: 400;
      color: var(--gray-600);
      margin-left: 0.3rem;
    }

    /* ── Icon section (mobile only) ─────────────────── */
    .icon-edit-section { display: none; }
    @media (max-width: 768px) {
      .icon-edit-section { display: block; }
    }

    /* ── Missing badge ───────────────────────────────── */
    .missing-badge {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--gray-600);
      border: 1px dashed var(--gray-800);
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      margin-left: 0.5rem;
      white-space: nowrap;
    }

    /* ── Artist list ─────────────────────────────────── */
    .artist-list {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem 1.5rem 4rem;
    }

    .artist-card {
      border: 1px solid var(--gray-800);
      border-radius: 8px;
      margin-bottom: 0.75rem;
      background: var(--gray-900);
      overflow: hidden;
    }

    .artist-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1rem;
      cursor: pointer;
      user-select: none;
    }
    @media (hover: hover) {
      .artist-header:hover { background: #222; }
    }
    .artist-header:active { background: #222; }

    .artist-icon { font-size: 1.3rem; min-width: 1.5rem; }
    .artist-name { font-size: 0.95rem; font-weight: 600; flex: 1; }
    .artist-desc {
      font-size: 0.78rem;
      color: var(--gray-400);
      flex: 2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artist-chevron {
      color: var(--gray-600);
      font-size: 0.75rem;
      transition: transform 0.15s;
    }
    .artist-card.open .artist-chevron { transform: rotate(90deg); }

    /* ── Expanded body ───────────────────────────────── */
    .artist-body {
      display: none;
      border-top: 1px solid var(--gray-800);
      padding: 1rem;
    }
    .artist-card.open .artist-body { display: block; }

    /* ── Edit section ────────────────────────────────── */
    .edit-section {
      margin-bottom: 1.25rem;
    }
    .edit-section-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }
    .current-value {
      font-size: 0.82rem;
      color: var(--gray-400);
      background: #111;
      border: 1px solid var(--gray-800);
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }
    .current-value.empty { color: var(--gray-600); font-style: italic; }

    .suggest-btn {
      font-size: 0.75rem;
      color: var(--pink);
      background: none;
      border: 1px solid var(--pink);
      border-radius: 4px;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      font-family: inherit;
    }
    @media (hover: hover) {
      .suggest-btn:hover { background: rgba(232,160,176,0.1); }
    }
    .suggest-btn:active { background: rgba(232,160,176,0.1); }

    /* ── Inline edit form ────────────────────────────── */
    .inline-form {
      display: none;
      margin-top: 0.75rem;
    }
    .inline-form.open { display: block; }

    .inline-form textarea {
      width: 100%;
      background: var(--gray-900);
      border: 1px solid var(--gray-800);
      border-radius: 4px;
      padding: 0.6rem 0.75rem;
      color: var(--white);
      font-family: inherit;
      font-size: 0.82rem;
      line-height: 1.5;
      resize: vertical;
      min-height: 80px;
      box-sizing: border-box;
      outline: none;
    }
    .inline-form textarea:focus { border-color: var(--gray-600); }

    .form-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .btn-submit {
      font-size: 0.78rem;
      font-weight: 600;
      background: var(--yellow);
      color: var(--black);
      border: none;
      border-radius: 4px;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-family: inherit;
    }
    @media (hover: hover) {
      .btn-submit:hover { opacity: 0.9; }
    }
    .btn-cancel {
      font-size: 0.78rem;
      color: var(--gray-600);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .submit-status {
      font-size: 0.75rem;
      margin-top: 0.4rem;
    }
    .submit-status.ok { color: var(--green); }
    .submit-status.err { color: #e08080; }

    /* ── Albums ──────────────────────────────────────── */
    .albums-section {
      margin-top: 1rem;
      border-top: 1px solid var(--gray-800);
      padding-top: 1rem;
    }
    .albums-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }
    .album-row {
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--gray-800);
    }
    .album-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .album-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }
    .album-year {
      font-size: 0.72rem;
      color: var(--gray-600);
      margin-bottom: 0.4rem;
    }

    /* ── Filter divider ──────────────────────────────── */
    .filter-divider {
      width: 1px;
      height: 20px;
      background: var(--gray-800);
      align-self: center;
    }

    /* ── Editorial toggle ────────────────────────────── */
    .editorial-toggle {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .editorial-toggle-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      background: var(--gray-800);
      border-radius: 10px;
      cursor: pointer;
      border: none;
      padding: 0;
      flex-shrink: 0;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: var(--gray-600);
      border-radius: 50%;
      transition: transform 0.15s, background 0.15s;
    }
    .toggle-switch.on {
      background: rgba(126, 200, 155, 0.25);
    }
    .toggle-switch.on::after {
      transform: translateX(16px);
      background: var(--green);
    }
    /* ── Empty state ─────────────────────────────────── */
    .empty-state {
      text-align: center;
      color: var(--gray-600);
      font-size: 0.85rem;
      padding: 3rem 0;
    }

    @media (max-width: 600px) {
      .artist-desc { display: none; }
    }
  </style>
</head>

<div class="page-header">
  <h1>Suggest an edit</h1>
  <p>See something missing or off? Expand any artist to suggest a description change.</p>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search artists..." autocomplete="off">
</div>

<div class="filter-bar">
  <button class="filter-btn" data-filter="missing" onclick="setFilter('missing', this)">Missing description <span class="filter-count" id="count-missing"></span></button>
  <button class="filter-btn" data-filter="has" onclick="setFilter('has', this)">Has description <span class="filter-count" id="count-has"></span></button>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All <span class="filter-count" id="count-all"></span></button>
  <span class="filter-divider"></span>
  <button class="filter-btn" data-filter="in-editorial" onclick="setFilter('in-editorial', this)">In Editorial <span class="filter-count" id="count-in-editorial"></span></button>
  <button class="filter-btn" data-filter="not-editorial" onclick="setFilter('not-editorial', this)">Not in Editorial <span class="filter-count" id="count-not-editorial"></span></button>
</div>

<div class="artist-list" id="artist-list">
  <div class="empty-state" id="loading">Loading...</div>
</div>

<script>
const FORMSPREE_ID = 'mykbdnak'; // replace with your Formspree form ID

let artistData = [];   // all artists
let albumData = {};    // { artist_name_lower: [{ album_title, year, description }] }
let activeFilter = 'all';
let searchQuery = '';

// ── Load CSVs ────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^\uFEFF/, ''));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"' && !inQ) { inQ = true; continue; }
      if (ch === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; continue; }
      if (ch === '"' && inQ) { inQ = false; continue; }
      if (ch === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
      cur += ch;
    }
    cols.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || '').trim());
    return obj;
  });
}

async function loadData() {
  const [artistRes, albumRes] = await Promise.all([
    fetch('./data/artist-editorial.csv'),
    fetch('./data/album-editorial.csv'),
  ]);
  const [artistText, albumText] = await Promise.all([artistRes.text(), albumRes.text()]);

  const artists = parseCSV(artistText);
  artists.sort((a, b) => a.name.localeCompare(b.name));
  artistData = artists;

  const albums = parseCSV(albumText);
  albums.forEach(row => {
    const key = row.artist_name.toLowerCase();
    if (!albumData[key]) albumData[key] = [];
    albumData[key].push(row);
  });

  updateCounts();
  applyFilters();
}

// ── Filter ────────────────────────────────────────────────────────────
function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  let filtered = artistData;
  if (searchQuery) {
    filtered = filtered.filter(a => a.name.toLowerCase().includes(searchQuery));
  }
  if (activeFilter === 'missing') {
    filtered = filtered.filter(a => !a.description);
  } else if (activeFilter === 'has') {
    filtered = filtered.filter(a => !!a.description);
  } else if (activeFilter === 'in-editorial') {
    filtered = filtered.filter(a => a.confirmed === 'yes');
  } else if (activeFilter === 'not-editorial') {
    filtered = filtered.filter(a => a.confirmed !== 'yes');
  }
  render(filtered);
}

function updateCounts() {
  const missing = artistData.filter(a => !a.description).length;
  const has = artistData.filter(a => !!a.description).length;
  const inEd = artistData.filter(a => a.confirmed === 'yes').length;
  const notEd = artistData.filter(a => a.confirmed !== 'yes').length;
  document.getElementById('count-missing').textContent = missing;
  document.getElementById('count-has').textContent = has;
  document.getElementById('count-all').textContent = artistData.length;
  document.getElementById('count-in-editorial').textContent = inEd;
  document.getElementById('count-not-editorial').textContent = notEd;
}

// ── Render ────────────────────────────────────────────────────────────
function render(artists) {
  const list = document.getElementById('artist-list');
  if (!artists.length) {
    list.innerHTML = '<div class="empty-state">No artists found.</div>';
    return;
  }

  list.innerHTML = artists.map(a => {
    const albums = albumData[a.name.toLowerCase()] || [];
    const albumRows = albums.map(alb => albumRowHTML(a.name, alb)).join('');
    const albumsSection = `
      <div class="albums-section">
        <div class="albums-label">Albums (${albums.length})</div>
        ${albums.length ? albumRows : '<div style="color:var(--gray-600);font-size:0.8rem;">No album descriptions yet.</div>'}
      </div>`;

    const hasdesc = !!a.description;
    const btnLabel = hasdesc ? 'Suggest edit' : 'Add description';
    return `
    <div class="artist-card" data-artist="${esc(a.name)}">
      <div class="artist-header" onclick="toggleCard(this)">
        <span class="artist-icon">${a.icon || '•'}</span>
        <span class="artist-name">${esc(a.name)}${a.confirmed === 'yes' ? '<span class="missing-badge" style="border-style:solid;color:var(--green);border-color:var(--green);">editorial</span>' : '<span class="missing-badge">not in editorial</span>'}${!hasdesc ? '<span class="missing-badge">no description</span>' : ''}</span>
        <span class="artist-desc">${esc(a.description || '')}</span>
        <span class="artist-chevron">▶</span>
      </div>
      <div class="artist-body">
        <div class="editorial-toggle">
          <button class="toggle-switch${a.confirmed === 'yes' ? ' on' : ''}"
                  data-artist="${esc(a.name)}"
                  data-confirmed="${a.confirmed === 'yes' ? 'yes' : 'no'}"
                  onclick="toggleLocal(this)"></button>
          <span class="editorial-toggle-label">In Editorial</span>
        </div>
        <div class="edit-section icon-edit-section">
          <div class="edit-section-label">Icon</div>
          <div class="current-value${a.icon ? '' : ' empty'}" style="font-size:1.4rem;padding:0.3rem 0.75rem;">${a.icon || 'No icon yet.'}</div>
          <button class="suggest-btn" onclick="openForm(this)">${a.icon ? 'Suggest icon' : 'Add icon'}</button>
          <div class="inline-form" data-artist="${esc(a.name)}" data-field="icon" data-old="${esc(a.icon || '')}">
            <input type="text" placeholder="Paste or type an emoji…" maxlength="8" style="background:var(--gray-900);border:1px solid var(--gray-800);border-radius:4px;padding:0.5rem 0.75rem;color:var(--white);font-family:inherit;font-size:1.4rem;width:100%;box-sizing:border-box;outline:none;">
            <div class="form-actions">
              <button class="btn-submit" onclick="submitIconForm(this)">Submit</button>
              <button class="btn-cancel" onclick="closeForm(this)">Cancel</button>
            </div>
            <div class="submit-status"></div>
          </div>
        </div>
        <div class="edit-section">
          <div class="edit-section-label">Artist description</div>
          <div class="current-value${a.description ? '' : ' empty'}">${a.description || 'No description yet.'}</div>
          <button class="suggest-btn" onclick="openForm(this)">${btnLabel}</button>
          <div class="inline-form" data-artist="${esc(a.name)}" data-field="description" data-old="${esc(a.description || '')}">
            <textarea placeholder="Your suggested description…"></textarea>
            <div class="form-actions">
              <button class="btn-submit" onclick="submitForm(this)">Submit</button>
              <button class="btn-cancel" onclick="closeForm(this)">Cancel</button>
            </div>
            <div class="submit-status"></div>
          </div>
        </div>
        ${albumsSection}
      </div>
    </div>`;
  }).join('');
}

function albumRowHTML(artistName, alb) {
  return `
  <div class="album-row">
    <div class="album-title">${esc(alb.album_title)}</div>
    <div class="album-year">${esc(alb.year)}</div>
    <div class="current-value${alb.description ? '' : ' empty'}">${esc(alb.description || 'No description yet.')}</div>
    <button class="suggest-btn" onclick="openForm(this)">Suggest edit</button>
    <div class="inline-form"
         data-artist="${esc(artistName)}"
         data-album="${esc(alb.album_title)}"
         data-field="description"
         data-old="${esc(alb.description || '')}">
      <textarea placeholder="Your suggested description…"></textarea>
      <div class="form-actions">
        <button class="btn-submit" onclick="submitForm(this)">Submit</button>
        <button class="btn-cancel" onclick="closeForm(this)">Cancel</button>
      </div>
      <div class="submit-status"></div>
    </div>
  </div>`;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Card toggle ───────────────────────────────────────────────────────
function toggleCard(header) {
  header.closest('.artist-card').classList.toggle('open');
}

// ── Form open/close ───────────────────────────────────────────────────
function openForm(btn) {
  const form = btn.nextElementSibling;
  form.classList.add('open');
  const focusEl = form.querySelector('textarea') || form.querySelector('input');
  if (focusEl) focusEl.focus();
  btn.style.display = 'none';
}

function closeForm(cancelBtn) {
  const form = cancelBtn.closest('.inline-form');
  form.classList.remove('open');
  const ta = form.querySelector('textarea');
  const inp = form.querySelector('input');
  if (ta) ta.value = '';
  if (inp) inp.value = '';
  form.querySelector('.submit-status').textContent = '';
  form.previousElementSibling.style.display = '';
}

// ── Submit icon (input instead of textarea) ───────────────────────────
async function submitIconForm(submitBtn) {
  const form = submitBtn.closest('.inline-form');
  const input = form.querySelector('input');
  const status = form.querySelector('.submit-status');
  const suggested = input.value.trim();

  if (!suggested) {
    status.textContent = 'Please enter an emoji.';
    status.className = 'submit-status err';
    return;
  }

  submitBtn.disabled = true;
  status.textContent = 'Submitting…';
  status.className = 'submit-status';

  const editorialState = getEditorialState(form);
  const payload = {
    artist_name: form.dataset.artist,
    album_title: '',
    field: 'icon',
    old_value: form.dataset.old,
    suggested_value: suggested,
    confirmed: editorialState,
    _subject: `Icon suggestion: ${form.dataset.artist}`,
  };

  try {
    const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (res.ok) {
      status.textContent = 'Submitted. Thanks!';
      status.className = 'submit-status ok';
      input.value = '';
      submitBtn.disabled = false;
      syncEditorialBadge(form);
    } else { throw new Error(); }
  } catch {
    status.textContent = 'Something went wrong. Try again.';
    status.className = 'submit-status err';
    submitBtn.disabled = false;
  }
}

// ── Submit ────────────────────────────────────────────────────────────
async function submitForm(submitBtn) {
  const form = submitBtn.closest('.inline-form');
  const textarea = form.querySelector('textarea');
  const status = form.querySelector('.submit-status');
  const suggested = textarea.value.trim();

  if (!suggested) {
    status.textContent = 'Please enter a suggestion.';
    status.className = 'submit-status err';
    return;
  }

  submitBtn.disabled = true;
  status.textContent = 'Submitting…';
  status.className = 'submit-status';

  const editorialState = getEditorialState(form);
  const payload = {
    artist_name: form.dataset.artist,
    album_title: form.dataset.album || '',
    field: form.dataset.field,
    old_value: form.dataset.old,
    suggested_value: suggested,
    confirmed: editorialState,
    _subject: `Editorial suggestion: ${form.dataset.artist}${form.dataset.album ? ' — ' + form.dataset.album : ''}`,
  };

  try {
    const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (res.ok) {
      status.textContent = 'Submitted. Thanks!';
      status.className = 'submit-status ok';
      textarea.value = '';
      submitBtn.disabled = false;
      syncEditorialBadge(form);
    } else {
      throw new Error();
    }
  } catch {
    status.textContent = 'Something went wrong. Try again.';
    status.className = 'submit-status err';
    submitBtn.disabled = false;
  }
}

// ── Toggle editorial (local only — submitted with the description form) ──
function toggleLocal(btn) {
  const wasOn = btn.dataset.confirmed === 'yes';
  btn.dataset.confirmed = wasOn ? 'no' : 'yes';
  btn.classList.toggle('on', !wasOn);
}

// Helper: get editorial toggle state for an artist card
function getEditorialState(form) {
  const card = form.closest('.artist-card');
  const toggle = card.querySelector('.toggle-switch');
  if (!toggle) return null;
  return toggle.dataset.confirmed;
}

// Update header badge + local data after successful submit
function syncEditorialBadge(form) {
  const card = form.closest('.artist-card');
  const toggle = card.querySelector('.toggle-switch');
  if (!toggle) return;
  const isOn = toggle.dataset.confirmed === 'yes';
  const badge = card.querySelector('.artist-name .missing-badge');
  if (badge) {
    if (isOn) {
      badge.textContent = 'editorial';
      badge.style.borderStyle = 'solid';
      badge.style.color = 'var(--green)';
      badge.style.borderColor = 'var(--green)';
    } else {
      badge.textContent = 'not in editorial';
      badge.style.borderStyle = 'dashed';
      badge.style.color = '';
      badge.style.borderColor = '';
    }
  }
  const artist = toggle.dataset.artist;
  const entry = artistData.find(a => a.name === artist);
  if (entry) entry.confirmed = toggle.dataset.confirmed;
  updateCounts();
}

// ── Search ────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function() {
  searchQuery = this.value.toLowerCase();
  applyFilters();
});

// ── Init ──────────────────────────────────────────────────────────────
loadData().catch(() => {
  document.getElementById('artist-list').innerHTML =
    '<div class="empty-state">Failed to load data.</div>';
});

// ── Hamburger ─────────────────────────────────────────────────────────
const navToggle = document.querySelector('.nav-toggle');
const navLinks = document.querySelector('.nav-links');
navToggle.addEventListener('click', () => {
  navLinks.classList.toggle('nav-links--open');
  navToggle.classList.toggle('nav-toggle--open');
});
</script>
